name: sim-verify

# Public-mirror twin of the private repo's .github/workflows/sim-verify.yml,
# for the Beastgearr/popup-verify public repo (free GitHub-hosted macOS
# runner minutes — the private repo's free Actions quota is exhausted and
# the founder will not pay).
#
# CANONICAL SOURCE: this file, at scripts/mirror/sim-verify.yml in the
# private POPUP repo. Edit HERE, then run scripts/sync-verify-mirror.ps1 to
# push the copy into the public repo's .github/workflows/sim-verify.yml.
# Do not hand-edit the workflow directly in the public repo — the next sync
# will silently overwrite it.
#
# Differences from the private workflow:
#   - No sparse-checkout of a private repo: this repo IS the maestro/ dir
#     (synced from app/PopUp/maestro/** in the private repo).
#   - DEMO_PHONE / DEMO_OTP are injected from this repo's own Actions
#     secrets (${{ secrets.DEMO_PHONE }} / ${{ secrets.DEMO_OTP }}) instead
#     of a plaintext env block — this repo is public, the private repo's
#     plaintext posture is not.
#   - No default artifact_url — every dispatch must pass one explicitly.
#
# Everything else (simulator boot, app install, Maestro invocation, video +
# screenshot capture, crash-report collection, artifact upload, job
# summary) is identical to the private lane.
#
# Per-flow step timeouts (2026-07-10, replacing one monolithic Maestro
# step): run 29046707377 (`flow=all` vs build #16) hit the 55-min JOB cap
# while stuck inside the single "Run Maestro walkthrough" step at 53m26s --
# the job-level cancellation ate the ~5-min upload grace period and
# force-killed the runner BEFORE the `if: always()` artifact-upload steps
# ran, so that run produced ZERO artifacts (no screenshots, no video, no
# JUnit, no syslog -- an empty logs archive). Contrast with run 29037752215,
# an earlier FAILING run (a real phone-field char-drop flake, see
# maestro/flows/01-boot-login.yaml's header) that still uploaded full
# diagnostics because it failed inside a step, not the job cap -- that
# failure was diagnosable; 29046707377's was not. Splitting the walkthrough
# into one step per flow, each with its OWN timeout-minutes, means a hang
# now fails a single step (not the whole job), the if: always()-gated
# finalize/upload steps always get to run, and the run gets per-flow timing
# for free (see the final gate step's per-flow outcome table, sourced from
# `steps.flow_0N.outcome`).
#
# Per-flow step budgets (flow=all runs login three times -- flows 01, 03,
# 04, the latter two via `runFlow: 01-boot-login.yaml` -- flow 01 alone
# took 9m48s while GREEN on run 29039997885):
#   01-boot-login:    16 min
#   02-map-and-tabs:   8 min
#   03-click-audit:   20 min
#   04-no-location:   16 min
#   job (backstop):   80 min -- loose ceiling only (sum of the above plus
#                     setup/finalize overhead); not meant to bind in normal
#                     operation now that each flow is independently bounded.

on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: "EAS iOS simulator build .tar.gz URL (applicationArchiveUrl from `eas build:list --platform ios --json`)"
        required: true
      flow:
        description: "Maestro flow to run: 'all' (01-04, per-flow steps) or a single filename e.g. 01-boot-login.yaml. 04-no-location.yaml always runs with the simulated location cleared, seeded or standalone."
        required: false
        default: "all"

jobs:
  sim-verify:
    runs-on: macos-15
    timeout-minutes: 80
    env:
      APP_ID: com.popupgram.ios
      FLOWS_DIR: maestro/flows
    steps:
      - name: Checkout (maestro flows + this workflow)
        uses: actions/checkout@v4

      - name: Set up Java (Maestro runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download EAS simulator tarball
        run: |
          set -euo pipefail
          echo "Downloading: ${{ github.event.inputs.artifact_url }}"
          curl -fL --retry 3 --retry-delay 5 -o app.tar.gz "${{ github.event.inputs.artifact_url }}"
          ls -lh app.tar.gz
          test -s app.tar.gz

      - name: Extract .app bundle
        run: |
          set -euo pipefail
          mkdir -p app_extract
          tar -xzf app.tar.gz -C app_extract
          APP_PATH="$(find app_extract -maxdepth 4 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app bundle found in tarball. Contents:"
            find app_extract -maxdepth 4 | head -n 50
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app: $APP_PATH"

      - name: Boot iOS simulator
        run: |
          set -euo pipefail
          echo "--- runtimes ---"
          xcrun simctl list runtimes
          # Pick an available iPhone dynamically — never hardcode a device name
          # that might not exist on the runner image. Take the last available
          # iPhone across iOS runtimes (jq is preinstalled on macOS runners).
          UDID="$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[] | select(.isAvailable and (.name | test("iPhone")))] | (.[-1].udid // "")')"
          if [ -z "$UDID" ]; then
            echo "ERROR: no available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator UDID=$UDID"
          # Belt: ask Simulator to connect a virtual hardware keyboard so the
          # software keyboard doesn't appear to cover bottom-pinned buttons.
          # Reported flaky across Xcode versions, so the Maestro flow also
          # dismisses the keyboard with a hardware Return (pressKey: Enter).
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool true || true
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID"
          open -a Simulator --args -CurrentDeviceUDID "$UDID" || true
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Install app + seed location/permission
        run: |
          set -euo pipefail
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          xcrun simctl privacy "$SIM_UDID" grant location-always "$APP_ID" || true
          # 04-no-location.yaml (v1-final-polish slice S5-c) proves the map's
          # Moscow-fallback camera (S1-a) holds when the sim has NO simulated
          # location at all -- the exact PopUp15 blank-void scenario. When
          # that flow is requested standalone, skip the seed / explicitly
          # clear it instead of the usual Moscow default. `flow: all`'s
          # location handling is more granular -- see the "Clear simulated
          # location" step below, which fires only on the seeded->no-location
          # transition (i.e. only when flow=all).
          if [ "${{ github.event.inputs.flow }}" = "04-no-location.yaml" ]; then
            echo "flow=04-no-location.yaml -- clearing any simulated location instead of seeding Moscow."
            xcrun simctl location "$SIM_UDID" clear || true
          else
            # Moscow default so <UserLocation> can render a self-dot on the map.
            xcrun simctl location "$SIM_UDID" set 55.7558,37.6173 || true
          fi

      - name: Install Maestro
        run: |
          set -euo pipefail
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version || true

      - name: Start syslog capture (background)
        # Diagnostic instrumentation: prior .ips crash reports had
        # exceptionReason: null, so the NSException name/reason has to come
        # from the unified log instead. Backgrounded within this step; killed
        # by PID file in the always()-gated step below, since GitHub Actions
        # runs each `run:` block as its own shell (can't background across
        # steps directly).
        run: |
          set -euo pipefail
          xcrun simctl spawn "$SIM_UDID" log stream --predicate 'process == "PopUp"' --style compact > "$RUNNER_TEMP/popup-syslog.txt" 2>&1 &
          echo $! > "$RUNNER_TEMP/popup-syslog.pid"

      - name: Start screen recording (background)
        # Job-scoped: recording spans every flow step below so a mid-flow
        # step-timeout kill (or a crash) still yields a video up to that
        # point. PID persisted to a file (same cross-step-background pattern
        # as the syslog capture above); stopped + flushed in the
        # if: always()-gated "Stop screen recording" step near the end.
        run: |
          set -euo pipefail
          mkdir -p artifacts
          xcrun simctl io "$SIM_UDID" recordVideo --codec h264 --force artifacts/run.mp4 &
          echo $! > "$RUNNER_TEMP/popup-video.pid"
          sleep 2

      - name: "Run Maestro flow: 01-boot-login"
        id: flow_01
        if: ${{ always() && (github.event.inputs.flow == 'all' || github.event.inputs.flow == '' || github.event.inputs.flow == '01-boot-login.yaml') }}
        timeout-minutes: 16
        env:
          # Public repo — no plaintext credentials in the workflow. Set via:
          #   gh secret set DEMO_PHONE -R Beastgearr/popup-verify
          #   gh secret set DEMO_OTP -R Beastgearr/popup-verify
          DEMO_PHONE: ${{ secrets.DEMO_PHONE }}
          DEMO_OTP: ${{ secrets.DEMO_OTP }}
        run: |
          set -uo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p artifacts/seeded/01-boot-login
          # GH Actions runs `run:` blocks as `bash -e {0}` -- errexit is ON
          # by default, regardless of this script's own `set` flags. Without
          # this set +e/set -e bracket, a FAILING maestro invocation aborts
          # the script immediately (skipping MAESTRO_EXIT=$?, the screenshot
          # mv below, and the trailing `exit` line entirely) -- the step
          # still reports failure correctly (bash inherits maestro's exit
          # code), but per-flow screenshot bucketing silently never runs.
          set +e
          maestro test "$FLOWS_DIR/01-boot-login.yaml" \
            -e DEMO_PHONE="$DEMO_PHONE" \
            -e DEMO_OTP="$DEMO_OTP" \
            --format junit \
            --output artifacts/maestro-report-01-boot-login.xml \
            --debug-output artifacts/maestro-debug-01-boot-login
          MAESTRO_EXIT=$?
          set -e
          mv ./*.png artifacts/seeded/01-boot-login/ 2>/dev/null || true
          echo "01-boot-login exit: $MAESTRO_EXIT"
          exit "$MAESTRO_EXIT"

      - name: "Run Maestro flow: 02-map-and-tabs"
        id: flow_02
        # No login of its own -- depends on 01-boot-login's persisted GoTrue
        # session (no runFlow, no clearState; see the flow file's header).
        # Still gated with always() rather than a success()-on-01 dependency:
        # a failed/timed-out 01 should not SKIP 02, it should let 02 fail on
        # its own terms (bounded by its own timeout) so the per-flow outcome
        # table stays honest about what actually happened.
        if: ${{ always() && (github.event.inputs.flow == 'all' || github.event.inputs.flow == '' || github.event.inputs.flow == '02-map-and-tabs.yaml') }}
        timeout-minutes: 8
        run: |
          set -uo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p artifacts/seeded/02-map-and-tabs
          # See the set +e/set -e note in the 01-boot-login step above --
          # same errexit-survival bracket, required here too.
          set +e
          maestro test "$FLOWS_DIR/02-map-and-tabs.yaml" \
            --format junit \
            --output artifacts/maestro-report-02-map-and-tabs.xml \
            --debug-output artifacts/maestro-debug-02-map-and-tabs
          MAESTRO_EXIT=$?
          set -e
          mv ./*.png artifacts/seeded/02-map-and-tabs/ 2>/dev/null || true
          echo "02-map-and-tabs exit: $MAESTRO_EXIT"
          exit "$MAESTRO_EXIT"

      - name: "Run Maestro flow: 03-click-audit"
        id: flow_03
        if: ${{ always() && (github.event.inputs.flow == 'all' || github.event.inputs.flow == '' || github.event.inputs.flow == '03-click-audit.yaml') }}
        timeout-minutes: 20
        env:
          DEMO_PHONE: ${{ secrets.DEMO_PHONE }}
          DEMO_OTP: ${{ secrets.DEMO_OTP }}
        run: |
          set -uo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p artifacts/seeded/03-click-audit
          # See the set +e/set -e note in the 01-boot-login step above --
          # same errexit-survival bracket, required here too.
          set +e
          maestro test "$FLOWS_DIR/03-click-audit.yaml" \
            -e DEMO_PHONE="$DEMO_PHONE" \
            -e DEMO_OTP="$DEMO_OTP" \
            --format junit \
            --output artifacts/maestro-report-03-click-audit.xml \
            --debug-output artifacts/maestro-debug-03-click-audit
          MAESTRO_EXIT=$?
          set -e
          mv ./*.png artifacts/seeded/03-click-audit/ 2>/dev/null || true
          echo "03-click-audit exit: $MAESTRO_EXIT"
          exit "$MAESTRO_EXIT"

      - name: Clear simulated location (seeded -> no-location transition)
        # Only fires on the flow=all (or blank) seeded->no-location
        # transition. A standalone 04-no-location.yaml dispatch already had
        # its location cleared in "Install app + seed location/permission"
        # above, so this step is a no-op there and stays skipped.
        if: ${{ always() && (github.event.inputs.flow == 'all' || github.event.inputs.flow == '') }}
        run: |
          set -uo pipefail
          echo "Clearing simulated location for 04-no-location.yaml"
          xcrun simctl location "$SIM_UDID" clear || true

      - name: "Run Maestro flow: 04-no-location"
        id: flow_04
        if: ${{ always() && (github.event.inputs.flow == 'all' || github.event.inputs.flow == '' || github.event.inputs.flow == '04-no-location.yaml') }}
        timeout-minutes: 16
        env:
          DEMO_PHONE: ${{ secrets.DEMO_PHONE }}
          DEMO_OTP: ${{ secrets.DEMO_OTP }}
        run: |
          set -uo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p artifacts/no-location/04-no-location
          # See the set +e/set -e note in the 01-boot-login step above --
          # same errexit-survival bracket, required here too.
          set +e
          maestro test "$FLOWS_DIR/04-no-location.yaml" \
            -e DEMO_PHONE="$DEMO_PHONE" \
            -e DEMO_OTP="$DEMO_OTP" \
            --format junit \
            --output artifacts/maestro-report-04-no-location.xml \
            --debug-output artifacts/maestro-debug-04-no-location
          MAESTRO_EXIT=$?
          set -e
          mv ./*.png artifacts/no-location/04-no-location/ 2>/dev/null || true
          echo "04-no-location exit: $MAESTRO_EXIT"
          exit "$MAESTRO_EXIT"

      - name: "Run Maestro flow: 04-no-location (retry)"
        id: flow_04_retry
        # 2026-07-1x infra-retry hardening (run 29054312690): flow 04 is the
        # LAST flow attempted per run, on an already-installed app + already-
        # booted simulator that's been through 3 prior flows -- the diagnosed
        # failure was the XCUITest driver never binding its port
        # ("Failed to connect to /127.0.0.1:51373" for 2 min, zero commands
        # executed, zero crash markers in syslog), i.e. runner-class flake,
        # not an app bug. One retry, same command, same timeout budget --
        # cheap because setup (install/boot/location seed) isn't repeated.
        # Gated on `always()` because a failed flow_04 already flips
        # success() to false for every later step in this job (matches the
        # always()-wrapping pattern every other flow step here already uses)
        # -- without it this condition would silently never evaluate true.
        if: ${{ always() && steps.flow_04.outcome == 'failure' }}
        timeout-minutes: 16
        env:
          DEMO_PHONE: ${{ secrets.DEMO_PHONE }}
          DEMO_OTP: ${{ secrets.DEMO_OTP }}
        run: |
          set -uo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p artifacts/no-location/04-no-location-retry
          # See the set +e/set -e note in the 01-boot-login step above --
          # same errexit-survival bracket, required here too.
          set +e
          maestro test "$FLOWS_DIR/04-no-location.yaml" \
            -e DEMO_PHONE="$DEMO_PHONE" \
            -e DEMO_OTP="$DEMO_OTP" \
            --format junit \
            --output artifacts/maestro-report-04-no-location-retry.xml \
            --debug-output artifacts/maestro-debug-04-no-location-retry
          MAESTRO_EXIT=$?
          set -e
          mv ./*.png artifacts/no-location/04-no-location-retry/ 2>/dev/null || true
          echo "04-no-location (retry) exit: $MAESTRO_EXIT"
          exit "$MAESTRO_EXIT"

      - name: Stop screen recording + finalize artifacts
        if: always()
        run: |
          set -uo pipefail
          mkdir -p artifacts
          if [ -f "$RUNNER_TEMP/popup-video.pid" ]; then
            REC_PID="$(cat "$RUNNER_TEMP/popup-video.pid")"
            kill -INT "$REC_PID" 2>/dev/null || true
            for _ in $(seq 1 30); do
              kill -0 "$REC_PID" 2>/dev/null || break
              sleep 0.5
            done
          fi
          # Any screenshots not already claimed by a per-flow step above,
          # plus a final full-screen sim shot.
          mv ./*.png artifacts/ 2>/dev/null || true
          xcrun simctl io "$SIM_UDID" screenshot artifacts/final.png || true

          # Belt: Maestro also writes per-command logs + on-failure screenshots
          # under ~/.maestro/tests/<timestamp>/ — copy them in so a failed run is
          # always diagnosable even if --debug-output didn't materialize.
          cp -R "$HOME/.maestro/tests" artifacts/maestro-tests 2>/dev/null || true
          # Native crash reports (a Maestro "App crashed or stopped" failure
          # points here) — copy any app crash .ips into the bundle. Small +
          # targeted (not a full `simctl diagnose`, which would bloat the job).
          mkdir -p artifacts/crash-reports
          cp "$HOME/Library/Logs/DiagnosticReports/"*.ips artifacts/crash-reports/ 2>/dev/null || true
          echo "--- artifacts dir ---"
          ls -laR artifacts | head -n 80 || true

      - name: Stop syslog capture
        if: always()
        run: |
          set -uo pipefail
          if [ -f "$RUNNER_TEMP/popup-syslog.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/popup-syslog.pid")" 2>/dev/null || true
          fi
          sleep 2
          mkdir -p artifacts
          cp "$RUNNER_TEMP/popup-syslog.txt" artifacts/popup-syslog.txt 2>/dev/null || true
          exit 0

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-verify-${{ github.run_id }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Upload syslog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: popup-syslog-${{ github.run_id }}
          path: ${{ runner.temp }}/popup-syslog.txt
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Job summary + status
        if: always()
        run: |
          set -uo pipefail
          O01="${{ steps.flow_01.outcome }}"
          O02="${{ steps.flow_02.outcome }}"
          O03="${{ steps.flow_03.outcome }}"
          O04="${{ steps.flow_04.outcome }}"
          O04_RETRY="${{ steps.flow_04_retry.outcome }}"

          # flow 04 gets one retry on infra-class failures (see the
          # flow_04_retry step's comment, run 29054312690). Gate logic
          # treats it as passed if EITHER attempt succeeded; the raw
          # outcome of both attempts stays in the table below for
          # attribution (which one actually passed).
          O04_EFFECTIVE="$O04"
          if [ "$O04" = "failure" ] && [ "$O04_RETRY" = "success" ]; then
            O04_EFFECTIVE="success"
          fi

          EXIT=0
          RAN_SOMETHING=0
          for O in "$O01" "$O02" "$O03" "$O04_EFFECTIVE"; do
            if [ "$O" != "success" ] && [ "$O" != "skipped" ]; then
              EXIT=1
            fi
            [ "$O" != "skipped" ] && RAN_SOMETHING=1
          done
          # All four flow steps skipped => the `flow` input matched none of
          # the known filenames (typo/unrecognized value) -- nothing was
          # actually verified. The original monolithic script would have
          # let `maestro test` fail loudly on a bad filename; a silent
          # all-skipped PASS here would be a false green, so fail instead.
          if [ "$RAN_SOMETHING" -eq 0 ]; then
            EXIT=1
            echo "ERROR: flow input '${{ github.event.inputs.flow }}' matched no known flow -- nothing ran." >&2
          fi

          {
            echo "## sim-verify result (public mirror)"
            echo ""
            echo "- App: \`${APP_ID}\`"
            echo "- Simulator UDID: \`${SIM_UDID:-n/a}\`"
            echo "- Flow input: \`${{ github.event.inputs.flow }}\`"
            echo "- Artifact URL: ${{ github.event.inputs.artifact_url }}"
            echo ""
            echo "| Flow | Step outcome |"
            echo "|------|--------------|"
            echo "| 01-boot-login | ${O01:-n/a} |"
            echo "| 02-map-and-tabs | ${O02:-n/a} |"
            echo "| 03-click-audit | ${O03:-n/a} |"
            echo "| 04-no-location | ${O04:-n/a} |"
            echo "| 04-no-location (retry) | ${O04_RETRY:-n/a} |"
            echo ""
            if [ "$EXIT" = "0" ]; then
              echo "- **Maestro: PASS ✅**"
            else
              echo "- **Maestro: FAIL ❌ (one or more flow steps did not succeed — see table above)**"
            fi
            echo ""
            echo "Artifacts (\`sim-verify-${{ github.run_id }}\`): run.mp4 (screen recording spanning all flows), final.png, per-flow screenshots under seeded/01-boot-login/, seeded/02-map-and-tabs/, seeded/03-click-audit/, no-location/04-no-location/ (present only for flows actually run), no-location/04-no-location-retry/ (present only if flow 04 failed and the retry ran), maestro-debug-<flow>/ (per-flow debug logs + on-failure screenshots; retry suffixed -retry), maestro-report-<flow>.xml (per-flow JUnit; retry suffixed -retry)."
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$EXIT"
