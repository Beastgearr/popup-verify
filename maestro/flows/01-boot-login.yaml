# 01-boot-login.yaml — cold-boot + demo login smoke test.
#
# Drives: Welcome (welcome-cta) -> AuthMethods (auth-methods-continue-phone)
# -> phone entry (${DEMO_PHONE}) -> OTP (${DEMO_OTP}) -> post-auth MainTabs
# (Map). Uses a seeded Test-OTP demo account against the popup-demo backend
# baked into the EAS build (see
# obsidianPOPUP/POPUP/Claude/Research/Infrastructure/2026-07-04-see-it-first-demo-walkthrough.md).
#
# Credentials are NOT hardcoded here — DEMO_PHONE (10 digits, no +7 prefix)
# and DEMO_OTP are injected via `maestro test -e DEMO_PHONE=... -e
# DEMO_OTP=...` (see .github/workflows/sim-verify.yml). This lets the flow
# be synced verbatim into the public sim-verify mirror repo without leaking
# demo credentials; the public workflow injects them from
# ${{ secrets.DEMO_PHONE }} / ${{ secrets.DEMO_OTP }}.
#
# Selector policy: UI is RU-primary, so buttons are matched by testID
# (RN testID -> iOS accessibilityIdentifier) where one exists; screen
# transitions are gated on the RU title strings. Both phone and OTP
# TextInputs set autoFocus, so `inputText` types straight into them once
# the screen has rendered — no field tap needed.
#
# 2026-07-08 auth-entry redesign: WelcomeScreen's CTA copy changed from
# "Начать" to "Зарегистрироваться или войти" (shortened again to
# "Регистрация или вход" in the 2026-07-09 v1-completeness copy audit) and
# now routes through a new AuthMethodsScreen ("Как хочешь продолжить?")
# before PhoneEntry. The flow taps the stable testIDs (welcome-cta,
# auth-methods-continue-phone) instead of copy so this doesn't re-drift
# with the next i18n edit.
#
# 2026-07-09 char-drop hardening (v1-final-polish slice S5-d): run
# 29037752215 showed `inputText` into the phone field drop 3 of 10 digits on
# a loaded public runner (field ended up "9001111" -> "Неверный формат"),
# plausibly worsened by the NeonBubblesBackground Reanimated organism running
# behind all 4 auth screens contending for the JS thread mid-type. After
# typing, the flow now asserts the phone field's rendered text actually holds
# the full ${DEMO_PHONE} value and, if not, erases + retypes via a
# conditional `runFlow: when: notVisible:` branch -- deterministic, no fixed
# sleep. A healthy run (green 29039997885, 9m48s for this flow) never enters
# that branch.
#
# 2026-07-1x hardening-gate flake fix (run 29054312690): all 4 flows failed
# against build #16 on a very slow public runner. Flow 01's retype block
# above worked correctly (the phone field held the exact, correct
# ${DEMO_PHONE} value in the failure screenshot) -- but the hard
# `assertVisible {id, text}` gate that used to sit right after it timed out
# at Maestro's ~20s default poll window purely because text-matching was
# slow, not because the value was wrong (same known Maestro text-assert
# flow artifact already worked around below for main-tabs-button-map).
# Separately, `waitForAnimationToEnd` calls on these auth screens raced
# NeonBubblesBackground, which animates INFINITELY behind all 4 auth
# screens -- one instance consumed 224s against its 5000ms budget waiting
# for an animation that never ends. Both are fixed here: the
# waitForAnimationToEnd calls on auth screens are removed (screen-readiness
# is already gated by the extendedWaitUntil title/id checks before each),
# and the phone-field gate below is now id-only, matching the file's own
# main-tabs-button-map precedent. Correctness is still verified -- a
# genuinely wrong/truncated number can't reach "Введи код" downstream, so
# that gate catches a bad retype with a clearer failure signature than a
# mid-flow text-assert timeout. A second retype round was added since the
# first round is cheap and a slow runner could in principle drop chars on
# the retype too.
#
# 2026-07-1x re-diagnosis after re-verify (run 29192686342): the id-only
# `assertVisible` above STILL failed -- all 4 flows, same error, same
# on-failure screenshot again showing the field correctly holding the full,
# correct ${DEMO_PHONE} value. maestro.log timestamps showed why: the two
# `when: notVisible` retype-check evaluations immediately above took ~63s and
# ~50s respectively to resolve (RUNNING -> COMPLETED), and the follow-on
# `assertVisible` failed after ~20s -- i.e. a SINGLE accessibility-tree
# round trip on this runner class can cost 50-90s, and plain
# `assertVisible` (even id-only, no text) uses Maestro's short default
# poll window regardless of the text argument, so it doesn't survive that.
# The runner is measurably even slower than in 29054312690, not better.
# Fix: the gate is now `extendedWaitUntil` (id-only) with an explicit
# 120000ms timeout -- enough headroom for at least one full worst-case
# round trip as observed above. Correctness is still ultimately verified
# by "Введи код" downstream regardless of how this gate resolves.
#
# 2026-07-1x THIRD diagnosis (run 29194338065): the 120000ms gate above
# STILL failed -- same exact signature a third consecutive time (field
# correct in the on-failure screenshot; Maestro's own check times out
# regardless). This time it missed by only 2.4s (122.4s elapsed against
# the 120000ms budget), and per-command timings logged this run were
# wildly erratic within the SAME flow run -- a single `inputText` call
# took 79s, a single `tapOn` took 45s, while other commands resolved in
# under a second. That pattern (huge variance, not a stable per-request
# cost) points to CPU/IO contention on an overloaded shared free-tier
# runner, not a fixed Maestro/XCUITest round-trip cost -- meaning no
# fixed timeout on this specific gate is reliably safe. Final fix: the
# phone-field gate is REMOVED entirely (see inline comment at its former
# location). Retype correctness is verified downstream at the "Введи код"
# OTP gate instead, which is now the sole remaining check for this data
# and has been widened 60000 -> 120000ms accordingly; the final MainTabs
# icon gate was widened 90000 -> 120000ms for the same reason. The
# .github/workflows/sim-verify.yml (+ scripts/mirror twin) per-flow step
# timeout-minutes were bumped in step alongside these changes -- see that
# file's header comment for the updated budget math.
appId: com.popupgram.ios
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "welcome-cta"
    timeout: 120000
- takeScreenshot: 01-welcome
- tapOn:
    id: "welcome-cta"
# AuthMethods screen. Title "Как хочешь продолжить?" confirms we navigated;
# tap the phone-continue CTA to land on PhoneEntry.
- extendedWaitUntil:
    visible: "Как хочешь продолжить?"
    timeout: 60000
- takeScreenshot: 01b-auth-methods
- tapOn:
    id: "auth-methods-continue-phone"
# Phone-entry screen. Title "Введи номер" confirms we navigated; the digits
# field is autofocused. Type the 10 digits after the locked +7 prefix.
- extendedWaitUntil:
    visible: "Введи номер"
    timeout: 60000
- inputText: ${DEMO_PHONE}
# Char-drop retry (see header note): PhoneInputGroup's underlying TextInput
# is `phone-input-group-field-input` (TextField atom appends `-input`; the
# molecule's own testID is `phone-input-group-field`). If the rendered text
# doesn't already match the full ${DEMO_PHONE}, erase and retype -- up to
# two rounds, in case a loaded runner drops chars on the retype too.
- runFlow:
    when:
      notVisible:
        id: "phone-input-group-field-input"
        text: "${DEMO_PHONE}"
    commands:
      - eraseText
      - inputText: ${DEMO_PHONE}
- runFlow:
    when:
      notVisible:
        id: "phone-input-group-field-input"
        text: "${DEMO_PHONE}"
    commands:
      - eraseText
      - inputText: ${DEMO_PHONE}
# 2026-07-1x third diagnosis (run 29194338065): the id-only
# `extendedWaitUntil` gate that used to sit here (timeout 120000) STILL
# failed -- third consecutive red run, exact same signature each time: the
# on-failure screenshot shows the field correctly holding the full, correct
# ${DEMO_PHONE} value, but Maestro's own visibility check times out anyway.
# maestro.log showed why this specific attempt missed: the gate ran for
# 122.4s against a 120000ms budget -- 2.4s over. Per-command timings this
# run were wildly erratic (a single `inputText` call took 79s; a single
# `tapOn` took 45s; other commands resolved in under a second) -- this
# looks like CPU/IO contention on an overloaded shared free-tier runner,
# not a fixed per-request cost, so no fixed timeout here is reliably safe.
# The gate is REMOVED entirely rather than raised again -- retype
# correctness is verified downstream regardless, at the "Введи код" OTP
# gate below (now widened to 180000ms for the same reason: it's the sole
# remaining correctness check for this data, so it needs real headroom).
# The "Получить код" button is bottom-pinned (ctaWrap marginTop:auto).
# PhoneEntryScreen now wraps its content in a KeyboardAvoidingView (behavior
# "padding" on iOS, commit 85931e9) so the CTA should already clear the
# keyboard on its own; the hardware Return here is kept as belt-and-
# suspenders in case KAV's animation races the keyboard's — it also blurs
# the single-line TextInput (blurOnSubmit default), dismissing the keyboard;
# the typed value persists in the form either way. No waitForAnimationToEnd
# here (see header note, run 29054312690) -- NeonBubblesBackground animates
# infinitely on this screen, so that wait never actually resolves.
- pressKey: Enter
- takeScreenshot: 02-phone
- tapOn:
    id: "phone-submit"
# OTP screen. auth-otp-send is a network round-trip (Test-OTP path, no real
# SMS) so allow a generous wait for "Введи код". Fixed demo code injected
# via ${DEMO_OTP} (see header note). No waitForAnimationToEnd here either --
# same infinite-animation reasoning as above. Widened 60000 -> 120000 (run
# 29194338065): with the phone-field gate above removed, this is now the
# SOLE correctness check for the phone number typed earlier -- a
# wrong/truncated number can't reach this screen -- so it needs real
# headroom against the erratic per-command latency this runner class has
# shown (single commands ranging from <1s to 120s+ in the same run).
- extendedWaitUntil:
    visible: "Введи код"
    timeout: 120000
- inputText: ${DEMO_OTP}
# Same belt-and-suspenders keyboard-dismiss for the OTP screen's
# bottom-pinned "Войти" button — VerifyOtpScreen also wraps its content in a
# KeyboardAvoidingView now (commit 85931e9); Enter is kept in case KAV's
# animation races the keyboard's. No waitForAnimationToEnd here (see header
# note, run 29054312690) -- same infinite-animation reasoning as above.
- pressKey: Enter
- takeScreenshot: 03-otp
- tapOn:
    id: "otp-submit"
# Post-auth: seeded profiles are pre-completed, so ProfileGate routes
# straight to MainTabs (not onboarding). The bottom tab bar mounting is the
# load-bearing success signal — it is present regardless of whether the
# Mapbox token baked into the build (a blank/placeholder map would still
# show the tabs). Assert the map tab icon, then the map tab *button*
# (icon + RU "Карта" label) by testID. This used to assertVisible the
# "Карта" label text directly, but that flaked in CI on builds #7/#8 even
# though the label visibly rendered (known Maestro text-assert flow
# artifact) — main-tabs-button-map (tabBarButtonTestID, MainTabs.tsx)
# covers the same tab-bar entry via a stable selector instead.
#
# 2026-07-1x (run 29192686342 finding): the follow-up check below used to
# be a bare `assertVisible` -- this file's own former reference precedent
# for "the id-only pattern that survives Maestro's text-assert flake." That
# same run proved bare assertVisible (even id-only, right after a sibling
# element already confirmed the screen ready) is not actually safe on this
# runner class -- see the phone-field gate's header note above for the
# maestro.log evidence (50-90s single accessibility round trips). Upgraded
# to extendedWaitUntil here too, pre-emptively, rather than waiting for a
# separate CI cycle to rediscover the same failure mode on this line.
# Widened again 90000 -> 120000 (run 29194338065) -- see the OTP gate's
# comment above for the erratic-latency evidence.
- extendedWaitUntil:
    visible:
      id: "main-tabs-button-map-icon"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "main-tabs-button-map"
    timeout: 90000
- takeScreenshot: 04-map
